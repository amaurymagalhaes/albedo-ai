syntax = "proto3";
package albedo.audio;

option go_package = "albedo-ai/daemon/proto;proto";

service AudioEngine {
  // Streaming: mic audio chunks → transcription results
  rpc StreamSTT(stream AudioChunk) returns (stream TranscriptionResult);

  // Server-push: completed transcriptions after internal VAD+Whisper
  rpc WatchTranscriptions(Empty) returns (stream TranscriptionResult);

  // Single: text → synthesized audio
  rpc Synthesize(SynthesizeRequest) returns (SynthesizeResponse);

  // Start/stop mic capture
  rpc StartCapture(CaptureConfig) returns (CaptureStatus);
  rpc StopCapture(Empty) returns (CaptureStatus);

  // List available input/output devices
  rpc ListDevices(Empty) returns (DeviceList);

  // Stream real-time audio input level (RMS)
  rpc WatchAudioLevel(Empty) returns (stream AudioLevel);

  // Force-transcribe raw PCM (no VAD)
  rpc ForceTranscribe(Empty) returns (TranscriptionResult);

  // Set output device for playback
  rpc SetOutputDevice(SetDeviceRequest) returns (Empty);

  // Toggle PTT recording on/off without stopping capture
  rpc SetPttRecording(PttRecordingRequest) returns (PttRecordingResponse);

  // Flush the playback buffer
  rpc ClearPlayback(Empty) returns (Empty);

  // Wait until playback buffer is fully drained
  rpc WaitForDrain(Empty) returns (Empty);

  // Enqueue raw PCM16 audio for playback (from external TTS)
  rpc EnqueuePCM(EnqueuePCMRequest) returns (EnqueuePCMResponse);

  // Start/stop desktop audio loopback
  rpc StartLoopback(Empty) returns (CaptureStatus);
  rpc StopLoopback(Empty) returns (CaptureStatus);
}

message AudioChunk {
  bytes  pcm_data    = 1;
  uint32 sample_rate = 2;
  bool   is_speech   = 3;
  uint64 timestamp_ms = 4;
}

message TranscriptionResult {
  string text         = 1;
  float  confidence   = 2;
  bool   is_final     = 3;
  uint64 timestamp_ms = 4;
}

message SynthesizeRequest {
  string text     = 1;
  string voice_id = 2;
  float  speed    = 3;
}

message SynthesizeResponse {
  bytes            pcm_data = 1;
  repeated Viseme  visemes  = 2;
}

message Viseme {
  string shape       = 1;
  uint32 start_ms    = 2;
  uint32 duration_ms = 3;
  float  weight      = 4;
}

message CaptureConfig {
  string device_id     = 1;
  uint32 sample_rate   = 2;
  float  vad_threshold = 3;
  string stt_backend   = 4;
  string stt_language  = 5;
}

message CaptureStatus {
  bool   active      = 1;
  string device_name = 2;
}

message DeviceList {
  repeated DeviceInfo inputs  = 1;
  repeated DeviceInfo outputs = 2;
}

message DeviceInfo {
  string id   = 1;
  string name = 2;
  bool   is_default = 3;
}

message SetDeviceRequest {
  string device_id = 1;
}

message AudioLevel {
  float rms = 1;
  float peak = 2;
  bool  is_speech = 3;
}

message PcmBuffer {
  bytes  pcm_data    = 1;
  uint32 sample_rate = 2;
}

message Empty {}

message EnqueuePCMRequest {
  bytes  pcm_data    = 1;
  uint32 sample_rate = 2;
}

message EnqueuePCMResponse {
  uint32 samples_enqueued = 1;
  double duration_ms      = 2;
}

message PttRecordingRequest {
  bool recording = 1;
}

message PttRecordingResponse {
  bool recording = 1;
  uint64 buffered_samples = 2;
}
